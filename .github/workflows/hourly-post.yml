name: Hourly UPSC Telegram Post

on:
  schedule:
    - cron: "30 0 * * *"   # 6:00 AM IST
    - cron: "30 1 * * *"   # 7:00 AM IST
    - cron: "30 2 * * *"   # 8:00 AM IST
    - cron: "30 3 * * *"   # 9:00 AM IST
    - cron: "30 4 * * *"   # 10:00 AM IST
    - cron: "30 5 * * *"   # 11:00 AM IST
    - cron: "30 6 * * *"   # 12:00 PM IST
    - cron: "30 7 * * *"   # 1:00 PM IST
    - cron: "30 8 * * *"   # 2:00 PM IST
    - cron: "30 9 * * *"   # 3:00 PM IST
    - cron: "30 10 * * *"  # 4:00 PM IST
    - cron: "30 11 * * *"  # 5:00 PM IST
    - cron: "30 12 * * *"  # 6:00 PM IST
  workflow_dispatch:
    inputs:
      force_test:
        description: "Force a test post even if outside 6 AM-6 PM IST schedule"
        required: false
        default: "false"
        type: boolean

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and send post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_TEST: ${{ inputs.force_test }}
        run: python post.py
