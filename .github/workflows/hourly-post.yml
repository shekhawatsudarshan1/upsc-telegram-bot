name: Hourly UPSC Telegram Post

on:
  schedule:
    - cron: "*/5 * * * *"   # Run every 5 minutes (TEST ONLY)

  workflow_dispatch:
    inputs:
      force_test:
        description: "Force a test post even if outside schedule"
        required: false
        default: "false"
        type: booleanto test

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and send post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python post.py
