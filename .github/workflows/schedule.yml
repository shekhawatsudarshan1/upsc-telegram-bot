name: Hourly UPSC Telegram Post

on:
  workflow_dispatch: {}       # lets you manually trigger a run from the Actions tab to test
  repository_dispatch:
    types: [hourly-trigger]   # triggered by cron-job.org every hour

permissions:
  contents: write   # needed so the job can commit topic_history.json back to the repo

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and send post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python post.py

      - name: Commit updated topic history
        run: |
          git config user.name "apex-cca-bot"
          git config user.email "actions@github.com"
          git add topic_history.json
          git diff --cached --quiet || git commit -m "Update topic history"
          git push
